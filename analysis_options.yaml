# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints (run via `flutter analyze`).

# Recommended lints for Flutter apps, packages, and plugins.
include: package:flutter_lints/flutter.yaml

analyzer:
  # Enables Riverpod-specific lints (missing provider deps, bad Notifier usage,
  # etc.) via the custom_lint plugin. Run them with: `dart run custom_lint`.
  plugins:
    - custom_lint
  # Generated files are not hand-written, so exclude them from analysis.
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  # Project-wide lint customizations. Suppress per-line with
  # `// ignore: name_of_lint` or per-file with `// ignore_for_file: name`.
  rules:
    prefer_single_quotes: true
